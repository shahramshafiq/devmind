<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="fav" type="image/png" />
    <script>
      (function() {
        var c = document.createElement('canvas'); c.width = c.height = 32;
        var x = c.getContext('2d');
        x.fillStyle = '#ff4500';
        x.beginPath();
        x.moveTo(8,0); x.lineTo(24,0); x.quadraticCurveTo(32,0,32,8);
        x.lineTo(32,24); x.quadraticCurveTo(32,32,24,32);
        x.lineTo(8,32); x.quadraticCurveTo(0,32,0,24);
        x.lineTo(0,8); x.quadraticCurveTo(0,0,8,0); x.fill();
        x.fillStyle = '#fff';
        x.beginPath();
        x.moveTo(20,4); x.lineTo(11,4); x.lineTo(8,15); x.lineTo(13,15);
        x.lineTo(10,28); x.lineTo(24,12); x.lineTo(18,12);
        x.closePath(); x.fill();
        document.getElementById('fav').href = c.toDataURL('image/png');
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevMind | AI Code Engineer</title>
    <meta name="description" content="Multi-Agent Autonomous Code Engineer. From GitHub issue to merged PR, automatically." />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  </body>
</html>
